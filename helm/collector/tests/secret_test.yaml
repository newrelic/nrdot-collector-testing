suite: test secret configuration
templates:
  - secret.yaml
tests:
  - it: should create secret when both values are provided
    set:
      secret.otlpEndpoint: https://otlp.nr-data.net:4318
      secret.licenseKey: test-license-key-123
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-collector-secret
      - equal:
          path: stringData.otlp-endpoint
          value: "https://otlp.nr-data.net:4318"
      - equal:
          path: stringData.license-key
          value: "test-license-key-123"

  - it: should create secret with only otlpEndpoint
    set:
      secret.otlpEndpoint: https://otlp.nr-data.net:4318
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.otlp-endpoint
          value: "https://otlp.nr-data.net:4318"
      - isNull:
          path: stringData.license-key

  - it: should create secret with only licenseKey
    set:
      secret.licenseKey: test-license-key-123
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.license-key
          value: "test-license-key-123"
      - isNull:
          path: stringData.otlp-endpoint

  - it: should not create secret when no values provided
    asserts:
      - hasDocuments:
          count: 0

---
suite: test secret env var injection in daemonset
templates:
  - daemonset.yaml
tests:
  - it: should inject both env vars when secret values are provided
    set:
      configMap.existingName: test-config
      secret.otlpEndpoint: https://otlp.nr-data.net:4318
      secret.licenseKey: test-license-key-123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: otlp-endpoint
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: license-key

  - it: should not inject env vars when no secret values provided
    set:
      configMap.existingName: test-config
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].env

  - it: should inject only OTEL_EXPORTER_OTLP_ENDPOINT when only otlpEndpoint provided
    set:
      configMap.existingName: test-config
      secret.otlpEndpoint: https://otlp.nr-data.net:4318
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: otlp-endpoint
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 1

  - it: should inject only NEW_RELIC_LICENSE_KEY when only licenseKey provided
    set:
      configMap.existingName: test-config
      secret.licenseKey: test-license-key-123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: license-key
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 1

  - it: should combine secret env vars with extraEnvs
    set:
      configMap.existingName: test-config
      secret.otlpEndpoint: https://otlp.nr-data.net:4318
      secret.licenseKey: test-license-key-123
      extraEnvs:
        - name: CUSTOM_VAR
          value: custom-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: otlp-endpoint
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: license-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_VAR
            value: custom-value
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 3

  - it: should inject SCENARIO_TAG when scenarioTag provided
    set:
      configMap.existingName: test-config
      scenarioTag: test-scenario-123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCENARIO_TAG
            value: "test-scenario-123"
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 1

  - it: should inject SERVICE_NAME when serviceName provided
    set:
      configMap.existingName: test-config
      serviceName: my-test-service
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVICE_NAME
            value: "my-test-service"
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 1

  - it: should inject all env vars when all values provided
    set:
      configMap.existingName: test-config
      secret.otlpEndpoint: https://otlp.nr-data.net:4318
      secret.licenseKey: test-license-key-123
      scenarioTag: test-scenario-456
      serviceName: full-test-service
      extraEnvs:
        - name: EXTRA_VAR
          value: extra-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: otlp-endpoint
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: license-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCENARIO_TAG
            value: "test-scenario-456"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVICE_NAME
            value: "full-test-service"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXTRA_VAR
            value: extra-value
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 5

---
suite: test secret env var injection in deployment
templates:
  - deployment.yaml
tests:
  - it: should inject both env vars in deployment mode
    set:
      mode: deployment
      replicaCount: 3
      configMap.existingName: test-config
      secret.otlpEndpoint: https://otlp.nr-data.net:4318
      secret.licenseKey: test-license-key-123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: otlp-endpoint
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEW_RELIC_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-collector-secret
                key: license-key

  - it: should inject scenarioTag and serviceName in deployment mode
    set:
      mode: deployment
      replicaCount: 3
      configMap.existingName: test-config
      scenarioTag: deployment-test-789
      serviceName: deployment-service
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SCENARIO_TAG
            value: "deployment-test-789"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVICE_NAME
            value: "deployment-service"
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 2
