suite: test daemonset
templates:
  - daemonset.yaml
tests:
  - it: should create a DaemonSet when mode is daemonset
    set:
      mode: daemonset
      configMap:
        existingName: test-configmap
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-collector

  - it: should use the correct image
    set:
      mode: daemonset
      configMap:
        existingName: test-configmap
      image:
        repository: custom/collector
        tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/collector:1.2.3

  - it: should reference the existing ConfigMap with default key
    set:
      mode: daemonset
      configMap:
        existingName: my-config
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: my-config
      - equal:
          path: spec.template.spec.volumes[0].configMap.items[0].key
          value: config.yaml
      - equal:
          path: spec.template.spec.volumes[0].configMap.items[0].path
          value: config.yaml

  - it: should reference the existing ConfigMap with custom key
    set:
      mode: daemonset
      configMap:
        existingName: my-config
        key: relay
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: my-config
      - equal:
          path: spec.template.spec.volumes[0].configMap.items[0].key
          value: relay
      - equal:
          path: spec.template.spec.volumes[0].configMap.items[0].path
          value: config.yaml

  - it: should apply pod labels
    set:
      mode: daemonset
      configMap:
        existingName: test-configmap
      podLabels:
        app: collector
        version: v1
    asserts:
      - equal:
          path: spec.template.metadata.labels.app
          value: collector
      - equal:
          path: spec.template.metadata.labels.version
          value: v1

  - it: should set resources when provided
    set:
      mode: daemonset
      configMap:
        existingName: test-configmap
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi

  - it: should fail when configMap.existingName is not set
    set:
      mode: daemonset
    asserts:
      - failedTemplate:
          errorMessage: "configMap.existingName is required"
