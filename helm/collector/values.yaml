# Deployment mode: daemonset or deployment
mode: daemonset

# Number of replicas (only used when mode is deployment)
replicaCount: 1

image:
  repository: newrelic/nrdot-collector
  pullPolicy: IfNotPresent
  tag: "1.11.0"

# ConfigMap containing the collector configuration
configMap:
  # Name of an existing ConfigMap
  existingName: ""
  # Key in the ConfigMap that contains the collector config
  key: "config.yaml"

# Additional labels to add to pods
podLabels: {}

# Additional command-line arguments for the collector
extraArgs: []
  # - "--log-level=debug"
  # - "--feature-gates=featureA,featureB"

# Additional environment variables
extraEnvs: []
  # - name: MY_ENV_VAR
  #   value: "my-value"
  # - name: SECRET_ENV
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: secret-key

# Additional volumes
extraVolumes: []
  # - name: extra-config
  #   configMap:
  #     name: extra-configmap

# Additional volume mounts
extraVolumeMounts: []
  # - name: extra-config
  #   mountPath: /etc/extra
  #   readOnly: true

# Resource limits and requests
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
